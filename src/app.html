<!doctype html>
<html lang="%lang%" dir="%dir%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<!-- Font preloads to prevent FOIT -->
		<link
			rel="preload"
			href="/fonts/montserrat.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			href="/fonts/funnel-display.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			href="/fonts/grenadier.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<!-- Preconnect for third-party origins -->
		<link rel="preconnect" href="https://www.googletagmanager.com" />
		<link rel="dns-prefetch" href="https://www.googletagmanager.com" />
		<link rel="preconnect" href="https://www.google-analytics.com" />
		<!-- Preconnect with Render Hosting Service -->
		<link rel="preconnect" href="https://gc-strapi.onrender.com" crossorigin="anonymous" />
		<!-- Google Tag Manager: load async as early as possible to reduce chain depth -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-D3VHMJRPSQ"></script>
		<link rel="stylesheet" href="/styles/app.css" />
		<link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
		<link rel="shortcut icon" href="/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="GamblingClub" />
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#ffffff" />
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
